<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Soullink Pokédex Ultimate</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#111;color:white}
.pokedex{width:100%;height:100vh;background:linear-gradient(145deg,#c40000,#8a0000);display:flex;justify-content:center;align-items:center}
.screen{width:90%;max-width:1000px;height:85%;background:#0a0a0a;border:10px solid #222;border-radius:20px;padding:10px;overflow:auto;position:relative;box-shadow:0 0 20px red}
.screen::after{content:"";position:absolute;width:100%;height:2px;background:rgba(255,255,255,0.3);animation:scan 2s linear infinite}
@keyframes scan{0%{top:0}100%{top:100%}}
.row{display:flex;justify-content:space-between;background:#1a1a1a;margin:5px;padding:8px;border-radius:8px;align-items:center}
button{background:#ff2a2a;border:none;color:white;padding:5px;border-radius:5px;margin:2px}
img{width:50px}
.suggest{background:#222;max-height:120px;overflow:auto}
.badges span{margin:3px;padding:6px;background:#333;border-radius:6px;cursor:pointer}
.active{background:gold;color:black}
</style>
</head>

<body>

<div class="pokedex">
<div class="screen">

<h2>📟 Soullink Pokédex</h2>

<input id="p1" placeholder="Spieler 1" oninput="suggest('p1','s1')">
<div id="s1" class="suggest"></div>

<input id="p2" placeholder="Spieler 2" oninput="suggest('p2','s2')">
<div id="s2" class="suggest"></div>

<button onclick="add()">Add</button>

<h3>🏅 Orden</h3>
<div id="badges" class="badges"></div>

<h3>🎮 Team</h3>
<div id="team"></div>

<h3>📦 Box</h3>
<div id="box"></div>

<h3>☠ Friedhof</h3>
<div id="grave"></div>

</div>
</div>

<script>

// DATA
let allPokemon=[]
let germanMap={}

async function loadData(){
 let res=await fetch("https://pokeapi.co/api/v2/pokemon?limit=2000")
 let data=await res.json()
 allPokemon=data.results.map(p=>p.name)

 for(let p of allPokemon.slice(0,200)){
  try{
   let s=await fetch("https://pokeapi.co/api/v2/pokemon-species/"+p)
   let d=await s.json()
   let de=d.names.find(n=>n.language.name==="de")
   if(de) germanMap[p]=de.name
  }catch{}
 }
}
loadData()

function sprite(n,shiny){
 return "https://play.pokemonshowdown.com/sprites/"+(shiny?"ani-shiny":"ani")+"/"+n+".gif"
}

// Firebase
const firebaseConfig={apiKey:"AIzaSyC1p7jvMAHOS3BR7vDAbbG-T5XTawBmkfU",projectId:"pokemon-soullink-12aef"}
firebase.initializeApp(firebaseConfig)
const db=firebase.firestore()

let session=localStorage.getItem("session")||"local"
let pairs=[]
let badges=[false,false,false,false,false,false,false,false]

const ref=db.collection("soullink").doc(session)
ref.onSnapshot(d=>{pairs=d.data()?.pairs||[];render()})
window.save=()=>ref.set({pairs})

// SEARCH
function suggest(id,box){
 let v=document.getElementById(id).value.toLowerCase()
 let b=document.getElementById(box)
 b.innerHTML=""
 if(!v)return

 allPokemon.filter(p=>{
  let de=germanMap[p]||""
  return p.includes(v)||de.toLowerCase().includes(v)
 }).slice(0,10).forEach(p=>{
  let d=document.createElement("div")
  d.textContent=(germanMap[p]||p)+" ("+p+")"
  d.onclick=()=>{
   document.getElementById(id).value=p
   b.innerHTML=""
  }
  b.appendChild(d)
 })
}

// ADD
function add(){
 pairs.push({p1:p1.value,p2:p2.value,loc:"team",sh1:false,sh2:false})
 save();render()
}

// RENDER
function render(){
 team.innerHTML="";box.innerHTML="";grave.innerHTML=""

 pairs.forEach((p,i)=>{
 let row=document.createElement("div")
 row.className="row"

 row.innerHTML=`
 <div>
 <img src="${sprite(p.p1,p.sh1)}">
 ${germanMap[p.p1]||p.p1} 🔗 ${germanMap[p.p2]||p.p2}
 <img src="${sprite(p.p2,p.sh2)}">
 </div>
 <div>
 <button onclick="autoEvo(${i},1)">⚡1</button>
 <button onclick="autoEvo(${i},2)">⚡2</button>
 <button onclick="manualEvo(${i},1)">⬆1</button>
 <button onclick="manualEvo(${i},2)">⬆2</button>
 <button onclick="shiny(${i},1)">⭐1</button>
 <button onclick="shiny(${i},2)">⭐2</button>
 <button onclick="move(${i},'team')">🎮</button>
 <button onclick="move(${i},'box')">📦</button>
 <button onclick="move(${i},'grave')">💀</button>
 </div>
 `

 if(p.loc==="team" && team.children.length<6) team.appendChild(row)
 else if(p.loc==="box") box.appendChild(row)
 else if(p.loc==="grave") grave.appendChild(row)
 else {p.loc="box";box.appendChild(row)}
 })
 renderBadges()
}

// MOVE
function move(i,l){pairs[i].loc=l;save();render()}

// SHINY
function shiny(i,p){
 if(p===1)pairs[i].sh1=!pairs[i].sh1
 else pairs[i].sh2=!pairs[i].sh2
 save();render()
}

// EVO
function manualEvo(i,p){
 let e=prompt("Entwicklung")
 if(!e)return
 if(p===1)pairs[i].p1=e.toLowerCase()
 else pairs[i].p2=e.toLowerCase()
 save();render()
}

async function autoEvo(i,p){
 let name=p===1?pairs[i].p1:pairs[i].p2
 try{
  let res=await fetch("https://pokeapi.co/api/v2/pokemon-species/"+name)
  let d=await res.json()
  let chain=await fetch(d.evolution_chain.url)
  let evo=await chain.json()
  let next=evo.chain.evolves_to[0]?.species.name
  if(next){
   if(p===1)pairs[i].p1=next
   else pairs[i].p2=next
  }
 }catch{}
 save();render()
}

// BADGES
function renderBadges(){
 let b=document.getElementById("badges")
 b.innerHTML=""
 badges.forEach((v,i)=>{
  let el=document.createElement("span")
  el.textContent="Orden "+(i+1)
  if(v) el.classList.add("active")
  el.onclick=()=>{badges[i]=!badges[i];renderBadges()}
  b.appendChild(el)
 })
}

</script>

</body>
</html>
